<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/ContadorDeCalorias.css" />
    <title>Contador De Calorias</title>
  </head>
  <body>
    <main>
      <h1>Contador De Calorias</h1>
      <div class="container">
        <form id="calorie-counter">
          <label for="budget">Presupuesto</label>
          <input
            type="number"
            min="0"
            id="budget"
            placeholder="Presupuesto de Calorias"
            required
          />
          <fieldset id="breakfast">
            <legend>Desayuno</legend>
            <div class="input-container"></div>
          </fieldset>
          <fieldset id="lunch">
            <legend>Almuerzo</legend>
            <div class="input-container"></div>
          </fieldset>
          <fieldset id="dinner">
            <legend>Cena</legend>
            <div class="input-container"></div>
          </fieldset>
          <fieldset id="snacks">
            <legend>Snacks</legend>
            <div class="input-container"></div>
          </fieldset>
          <fieldset id="exercise">
            <legend>Ejercicio</legend>
            <div class="input-container"></div>
          </fieldset>
          <div class="controls">
            <span>
              <label for="entry-dropdown">Agrega Comida o ejercicios:</label>
              <select id="entry-dropdown" name="options">
                <option value="breakfast" selected>Desayuno</option>
                <option value="lunch">Alnuerzo</option>
                <option value="dinner">Cena</option>
                <option value="snacks">Snacks</option>
                <option value="exercise">Ejercicio</option>
              </select>
              <button type="button" id="add-entry">Agrega una entrada</button>
            </span>
          </div>
          <div>
            <button type="submit">
              Calcula las calorias restantes
            </button>
            <button type="button" id="clear">Limpiar</button>
          </div>
        </form>
        <div id="output" class="output hide"></div>
      </div>
    </main>
    <script src="/ContadorDeCalorias.js"></script>
  </body>
</html>
